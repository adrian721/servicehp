<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cek Status Service - Adinda Cell</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-family-awesome/6.4.0/css/all.min.css">
    <style>.gradient-bg { background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%); }</style>
</head>
<body class="bg-gray-50 font-sans antialiased min-h-screen flex flex-col justify-between">
    <header class="gradient-bg text-white shadow-md">
        <div class="max-w-xl mx-auto px-4 py-4 flex justify-between items-center">
            <a href="index.html" class="flex items-center space-x-2 text-sm font-semibold hover:text-blue-200">
                <i class="fa-solid fa-arrow-left"></i><span>Kembali ke Form</span>
            </a>
            <span class="text-xs bg-white/20 px-3 py-1 rounded-full border border-white/20">Tracking Service</span>
        </div>
    </header>

    <main class="max-w-xl mx-auto px-4 py-8 w-full flex-grow">
        <div class="bg-white rounded-2xl shadow-xl p-6 border border-gray-100">
            <div class="text-center mb-6">
                <div class="w-12 h-12 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center mx-auto mb-3 text-xl">
                    <i class="fa-solid fa-magnifying-glass"></i>
                </div>
                <h2 class="text-xl font-bold text-gray-800">Cek Status Service</h2>
                <p class="text-xs text-gray-500 mt-1">Masukkan Nomor WhatsApp / ID Nota Anda</p>
            </div>

            <form id="searchForm" class="space-y-4">
                <input type="text" id="searchInput" required placeholder="Contoh: 081234567890 / AC-1234" class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:bg-white focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm text-center font-medium">
                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-xl shadow-md text-sm">Cek Status Sekarang</button>
            </form>

            <div id="resultBox" class="hidden mt-8 pt-6 border-t border-gray-100 space-y-4">
                <div class="flex justify-between items-center bg-blue-50 p-3 rounded-xl border border-blue-100">
                    <div>
                        <p id="resNota" class="text-xs font-bold text-blue-900">ID Nota: #---</p>
                        <p id="resTanggal" class="text-[10px] text-blue-600">--/--/----</p>
                    </div>
                    <span id="resBadgeStatus" class="px-3 py-1 rounded-full text-xs font-bold bg-yellow-100 text-yellow-800 border">Proses</span>
                </div>

                <div class="space-y-2 text-xs text-gray-600 bg-gray-50 p-4 rounded-xl border border-gray-100">
                    <div class="flex justify-between border-b pb-1.5"><span class="text-gray-400">Pemilik:</span><span id="resNama" class="font-semibold text-gray-800">-</span></div>
                    <div class="flex justify-between border-b pb-1.5"><span class="text-gray-400">Unit Gadget:</span><span id="resUnit" class="font-semibold text-gray-800">-</span></div>
                    <div class="flex justify-between pb-1"><span class="text-gray-400">Kerusakan:</span><span id="resKerusakan" class="font-semibold text-gray-800 text-right">-</span></div>
                </div>
            </div>

            <div id="emptyBox" class="hidden mt-6 text-center text-xs text-red-500 bg-red-50 p-3 rounded-xl border border-red-100">Data service tidak ditemukan.</div>
        </div>
    </main>

    <script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

  const firebaseConfig = {
  apiKey: "AIzaSyBBMOpC0fys4xMAmYjSutZzNiLvauYa9sI",
  authDomain: "adinda-cell-pwa.firebaseapp.com",
  projectId: "adinda-cell-pwa",
  storageBucket: "adinda-cell-pwa.firebasestorage.app",
  messagingSenderId: "466300360784",
  appId: "1:466300360784:web:6d7919024a13d9d4045955"
};
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  document.getElementById('searchForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      const input = document.getElementById('searchInput').value.trim();
      const resultBox = document.getElementById('resultBox');
      const emptyBox = document.getElementById('emptyBox');

      try {
          // Cari data berdasarkan nomor WA atau No Nota di Cloud Server
          const qWa = query(collection(db, "services"), where("wa", "==", input));
          const qNota = query(collection(db, "services"), where("nota", "==", input));

          let querySnapshot = await getDocs(qWa);
          if (querySnapshot.empty) {
              querySnapshot = await getDocs(qNota);
          }

          if (!querySnapshot.empty) {
              const data = querySnapshot.docs[0].data();
              emptyBox.classList.add('hidden');
              resultBox.classList.remove('hidden');

              document.getElementById('resNota').innerText = "ID Nota: " + data.nota;
              document.getElementById('resTanggal').innerText = data.createdAt ? new Date(data.createdAt.seconds * 1000).toLocaleDateString('id-ID') : '-';
              document.getElementById('resNama').innerText = data.nama;
              document.getElementById('resUnit').innerText = data.merk + " " + data.tipe;
              document.getElementById('resKerusakan').innerText = data.kerusakan;

              const badge = document.getElementById('resBadgeStatus');
              badge.innerText = data.status;
          } else {
              resultBox.classList.add('hidden');
              emptyBox.classList.remove('hidden');
          }
      } catch (err) {
          alert("Gagal mengambil data server: " + err.message);
      }
  });
</script>
</body>
</html>
