<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Admin - Adinda Cell</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-family-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-100 font-sans antialiased min-h-screen">
    <header class="bg-slate-900 text-white px-6 py-4 flex justify-between items-center shadow-lg">
        <div class="flex items-center space-x-3">
            <div class="bg-blue-600 p-2 rounded-lg"><i class="fa-solid fa-screwdriver-wrench"></i></div>
            <h1 class="font-bold text-lg">ADINDA CELL <span class="text-xs bg-blue-500/30 text-blue-300 px-2 py-0.5 rounded ml-2">Panel Admin</span></h1>
        </div>
        <a href="index.html" class="text-xs bg-slate-800 hover:bg-slate-700 px-3 py-2 rounded-lg border border-slate-700"><i class="fa-solid fa-globe mr-1"></i> Lihat Web</a>
    </header>

    <main class="max-w-6xl mx-auto p-4 md:p-6 space-y-6">
        <div class="bg-white rounded-2xl shadow-sm border overflow-hidden">
            <div class="p-5 border-b flex justify-between items-center bg-gray-50">
                <h3 class="font-bold text-gray-800 text-sm">Daftar Antrean Service</h3>
                <span id="totalData" class="text-xs bg-blue-100 text-blue-800 font-bold px-2.5 py-1 rounded-full">0 Unit</span>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-gray-100 text-gray-600 text-xs uppercase"><th class="p-4">Nota / Tgl</th><th class="p-4">Pelanggan</th><th class="p-4">Unit & Kerusakan</th><th class="p-4">Status</th><th class="p-4 text-center">Aksi</th></tr>
                    </thead>
                    <tbody id="tableBody" class="divide-y divide-gray-100 text-xs"></tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        function getDB() { return JSON.parse(localStorage.getItem('adinda_service_db')) || []; }
        function saveDB(data) { localStorage.setItem('adinda_service_db', JSON.stringify(data)); renderTable(); }

        function updateStatus(nota, newStatus) {
            const db = getDB();
            const item = db.find(i => i.nota === nota);
            if(item) { item.status = newStatus; saveDB(db); }
        }

        function hapusData(nota) {
            if(confirm('Hapus data ' + nota + '?')) {
                saveDB(getDB().filter(i => i.nota !== nota));
            }
        }

        function kirimWA(wa, nama, nota, status) {
            const pesan = `Halo kak ${nama},\n\nUpdate status service Nota *${nota}* di Adinda Cell: *${status.toUpperCase()}*.\n\nTerima kasih!`;
            window.open(`https://api.whatsapp.com/send?phone=${wa}&text=${encodeURIComponent(pesan)}`, '_blank');
        }

        function renderTable() {
            const db = getDB();
            const tbody = document.getElementById('tableBody');
            document.getElementById('totalData').innerText = db.length + " Unit";

            if(db.length === 0) {
                tbody.innerHTML = `<tr><td colspan="5" class="p-6 text-center text-gray-400">Belum ada data antrean service.</td></tr>`;
                return;
            }

            tbody.innerHTML = db.map(item => `
                <tr class="hover:bg-gray-50">
                    <td class="p-4 font-medium"><span class="font-bold text-blue-600">${item.nota}</span><div class="text-[10px] text-gray-400">${item.tanggal}</div></td>
                    <td class="p-4"><div class="font-bold text-gray-800">${item.nama}</div><div class="text-[11px] text-gray-500">${item.wa}</div></td>
                    <td class="p-4"><div class="font-semibold text-gray-700">${item.merk} ${item.tipe}</div><div class="text-[11px] text-gray-500">${item.kerusakan}</div></td>
                    <td class="p-4">
                        <select onchange="updateStatus('${item.nota}', this.value)" class="bg-gray-50 border text-xs rounded-lg p-1.5 font-semibold">
                            <option value="Menunggu" ${item.status === 'Menunggu' ? 'selected' : ''}>Menunggu</option>
                            <option value="Diproses" ${item.status === 'Diproses' ? 'selected' : ''}>Diproses</option>
                            <option value="Selesai" ${item.status === 'Selesai' ? 'selected' : ''}>Selesai</option>
                        </select>
                    </td>
                    <td class="p-4 text-center space-x-1">
                        <button onclick="kirimWA('${item.wa}', '${item.nama}', '${item.nota}', '${item.status}')" class="bg-green-500 text-white p-2 rounded-lg"><i class="fa-brands fa-whatsapp"></i></button>
                        <button onclick="hapusData('${item.nota}')" class="bg-red-500 text-white p-2 rounded-lg"><i class="fa-solid fa-trash"></i></button>
                    </td>
                </tr>
            `).join('');
        }
        renderTable();
    </script>
</body>
</html>
