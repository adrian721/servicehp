<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Admin - Adinda Cell</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-family-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-100 font-sans antialiased min-h-screen">

    <!-- Modal Login Admin (Default Tampil) -->
    <div id="loginModal" class="fixed inset-0 bg-slate-900/80 backdrop-blur-sm z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl shadow-2xl p-6 md:p-8 max-w-sm w-full border border-gray-100">
            <div class="text-center mb-6">
                <div class="w-12 h-12 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center mx-auto mb-3 text-xl">
                    <i class="fa-solid fa-user-shield"></i>
                </div>
                <h2 class="text-xl font-bold text-gray-800">Login Admin</h2>
                <p class="text-xs text-gray-500 mt-1">Masukkan kredensial Adinda Cell</p>
            </div>

            <form id="loginForm" class="space-y-4">
                <div>
                    <label class="block text-xs font-semibold text-gray-600 mb-1">Email Admin</label>
                    <input type="email" id="loginEmail" required placeholder="admin@adindacell.com"
                        class="w-full px-3 py-2.5 bg-gray-50 border border-gray-200 rounded-lg text-sm focus:bg-white focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-600 mb-1">Password</label>
                    <input type="password" id="loginPassword" required placeholder="••••••••"
                        class="w-full px-3 py-2.5 bg-gray-50 border border-gray-200 rounded-lg text-sm focus:bg-white focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>

                <p id="loginError" class="hidden text-xs text-red-500 text-center font-medium bg-red-50 p-2 rounded-lg border border-red-100"></p>

                <button type="submit" id="btnLogin"
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2.5 px-4 rounded-lg shadow-md transition-all text-sm">
                    Masuk ke Dashboard
                </button>
            </form>
        </div>
    </div>

    <!-- Content Dashboard (Hidden Default) -->
    <div id="adminContent" class="hidden">
        <!-- Navbar Admin -->
        <header class="bg-slate-900 text-white px-6 py-4 flex justify-between items-center shadow-lg">
            <div class="flex items-center space-x-3">
                <div class="bg-blue-600 p-2 rounded-lg">
                    <i class="fa-solid fa-screwdriver-wrench"></i>
                </div>
                <h1 class="font-bold text-lg">ADINDA CELL <span class="text-xs bg-blue-500/30 text-blue-300 px-2 py-0.5 rounded ml-2">Panel Admin</span></h1>
            </div>
            <div class="flex items-center space-x-3">
                <a href="index.html" class="text-xs bg-slate-800 hover:bg-slate-700 px-3 py-2 rounded-lg border border-slate-700 transition-all">
                    <i class="fa-solid fa-globe mr-1"></i> Web
                </a>
                <button id="btnLogout" class="text-xs bg-red-600 hover:bg-red-700 text-white font-semibold px-3 py-2 rounded-lg transition-all flex items-center gap-1">
                    <i class="fa-solid fa-right-from-bracket"></i> Keluar
                </button>
            </div>
        </header>

        <main class="max-w-6xl mx-auto p-4 md:p-6 space-y-6">
            <!-- Tabel Data Service -->
            <div class="bg-white rounded-2xl shadow-sm border border-gray-200 overflow-hidden">
                <div class="p-5 border-b border-gray-100 flex justify-between items-center bg-gray-50">
                    <h3 class="font-bold text-gray-800 text-sm">Daftar Antrean Service (Real-Time Cloud)</h3>
                    <span id="totalData" class="text-xs bg-blue-100 text-blue-800 font-bold px-2.5 py-1 rounded-full">0 Unit</span>
                </div>

                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-gray-100 text-gray-600 text-xs uppercase tracking-wider">
                                <th class="p-4">Nota / Tgl</th>
                                <th class="p-4">Pelanggan</th>
                                <th class="p-4">Unit & Kerusakan</th>
                                <th class="p-4">Status</th>
                                <th class="p-4 text-center">Aksi</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody" class="divide-y divide-gray-100 text-xs">
                            <tr><td colspan="5" class="p-6 text-center text-gray-400">Memuat data dari server...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <!-- Module JS Firebase -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, doc, updateDoc, deleteDoc, orderBy, query } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // Konfigurasi Firebase Kamu
          const firebaseConfig = {
          apiKey: "AIzaSyBBMOpC0fys4xMAmYjSutZzNiLvauYa9sI",
          authDomain: "adinda-cell-pwa.firebaseapp.com",
          projectId: "adinda-cell-pwa",
          storageBucket: "adinda-cell-pwa.firebasestorage.app",
          messagingSenderId: "466300360784",
          appId: "1:466300360784:web:6d7919024a13d9d4045955"
  };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const loginModal = document.getElementById('loginModal');
        const adminContent = document.getElementById('adminContent');
        const loginError = document.getElementById('loginError');

        // 1. Cek Status Autentikasi Pengguna
        onAuthStateChanged(auth, (user) => {
            if (user) {
                // Pengguna Sudah Login
                loginModal.classList.add('hidden');
                adminContent.classList.remove('hidden');
                muatDataRealtime();
            } else {
                // Pengguna Belum Login / Logout
                loginModal.classList.remove('hidden');
                adminContent.classList.add('hidden');
            }
        });

        // 2. Proses Submit Form Login
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            const btnLogin = document.getElementById('btnLogin');

            btnLogin.disabled = true;
            btnLogin.innerText = "Memverifikasi...";
            loginError.classList.add('hidden');

            try {
                await signInWithEmailAndPassword(auth, email, password);
            } catch (error) {
                loginError.innerText = "Email atau Password salah!";
                loginError.classList.remove('hidden');
            } finally {
                btnLogin.disabled = false;
                btnLogin.innerText = "Masuk ke Dashboard";
            }
        });

        // 3. Tombol Logout
        document.getElementById('btnLogout').addEventListener('click', () => {
            if (confirm("Keluar dari panel admin?")) {
                signOut(auth);
            }
        });

        // 4. Load Data Realtime Firestore (Hanya berjalan jika sudah Login)
        function muatDataRealtime() {
            const q = query(collection(db, "services"), orderBy("createdAt", "desc"));
            onSnapshot(q, (snapshot) => {
                const tbody = document.getElementById('tableBody');
                document.getElementById('totalData').innerText = snapshot.size + " Unit";

                if (snapshot.empty) {
                    tbody.innerHTML = `<tr><td colspan="5" class="p-6 text-center text-gray-400">Belum ada antrean service.</td></tr>`;
                    return;
                }

                tbody.innerHTML = snapshot.docs.map(docSnap => {
                    const item = docSnap.data();
                    const docId = docSnap.id;
                    const tgl = item.createdAt ? new Date(item.createdAt.seconds * 1000).toLocaleDateString('id-ID') : '-';

                    return `
                        <tr class="hover:bg-gray-50 border-b">
                            <td class="p-4 font-medium">
                                <span class="font-bold text-blue-600">${item.nota}</span>
                                <div class="text-[10px] text-gray-400">${tgl}</div>
                            </td>
                            <td class="p-4">
                                <div class="font-bold text-gray-800">${item.nama}</div>
                                <div class="text-[11px] text-gray-500">${item.wa}</div>
                            </td>
                            <td class="p-4">
                                <div class="font-semibold text-gray-700">${item.merk} ${item.tipe}</div>
                                <div class="text-[11px] text-gray-500 max-w-xs truncate">${item.kerusakan}</div>
                                ${item.geotag ? `<a href="${item.geotag}" target="_blank" class="text-[10px] text-blue-500 hover:underline"><i class="fa-solid fa-map-pin"></i> Buka Maps</a>` : ''}
                            </td>
                            <td class="p-4">
                                <select onchange="window.ubahStatus('${docId}', this.value)" class="bg-gray-50 border text-xs rounded-lg p-1.5 font-semibold">
                                    <option value="Menunggu" ${item.status === 'Menunggu' ? 'selected' : ''}>Menunggu</option>
                                    <option value="Diproses" ${item.status === 'Diproses' ? 'selected' : ''}>Diproses</option>
                                    <option value="Selesai" ${item.status === 'Selesai' ? 'selected' : ''}>Selesai</option>
                                </select>
                            </td>
                            <td class="p-4 text-center space-x-1">
                                <button onclick="window.kirimWA('${item.wa}', '${item.nama}', '${item.nota}', '${item.status}')" class="bg-green-500 text-white p-2 rounded-lg hover:bg-green-600" title="Kirim WA">
                                    <i class="fa-brands fa-whatsapp"></i>
                                </button>
                                <button onclick="window.hapus('${docId}')" class="bg-red-500 text-white p-2 rounded-lg hover:bg-red-600" title="Hapus">
                                    <i class="fa-solid fa-trash"></i>
                                </button>
                            </td>
                        </tr>
                    `;
                }).join('');
            });
        }

        // Global Window Functions untuk Aksi Tabel
        window.ubahStatus = async (id, statusBaru) => {
            await updateDoc(doc(db, "services", id), { status: statusBaru });
        };

        window.hapus = async (id) => {
            if (confirm("Yakin ingin menghapus data ini dari server cloud?")) {
                await deleteDoc(doc(db, "services", id));
            }
        };

        window.kirimWA = (wa, nama, nota, status) => {
            const pesan = `Halo kak ${nama},\n\nUpdate status service Nota *${nota}* di Adinda Cell saat ini: *${status.toUpperCase()}*.\n\nTerima kasih!`;
            window.open(`https://api.whatsapp.com/send?phone=${wa}&text=${encodeURIComponent(pesan)}`, '_blank');
        };
    </script>
</body>
</html>
